spring.application.name=parallax

spring.datasource.url=${DB_URL:jdbc:h2:mem:parallax;DB_CLOSE_DELAY=-1;MODE=PostgreSQL}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

app.user.banned-words=admin,support,root,system,postmaster

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email

spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET}
spring.security.oauth2.client.registration.github.scope=user:email

app.jwt.secret=${JWT_SECRET}

app.jwt.expiration-ms=3600000
app.jwt.refresh-expiration-ms=604800000


# Runner files
code.runner.image-name=py-collab-runner
code.session.image-name=py-collab-session


# Run code limits
code.runner.max-output-bytes=65536

parallax.storage.root=${user.home}/parallax
parallax.storage.sessions=${parallax.storage.root}/sessions
parallax.storage.projects=${parallax.storage.root}/projects

server.address=0.0.0.0
server.port=8080

code.runner.base-path=/var/code_sessions

server:
port: ${PORT:8080}
