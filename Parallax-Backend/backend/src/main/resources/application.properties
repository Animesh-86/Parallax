spring.application.name=parallax
spring.config.import=optional:file:.env[.properties]

spring.datasource.url=${DB_URL:jdbc:h2:mem:parallax;DB_CLOSE_DELAY=-1;MODE=PostgreSQL}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

app.user.banned-words=admin,support,root,system,postmaster

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:parallax-local-google-client}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:parallax-local-google-secret}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/google

spring.security.oauth2.client.provider.google.issuer-uri=https://accounts.google.com
spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth
spring.security.oauth2.client.provider.google.token-uri=https://www.googleapis.com/oauth2/v4/token
spring.security.oauth2.client.provider.google.user-info-uri=https://www.googleapis.com/oauth2/v3/userinfo
spring.security.oauth2.client.provider.google.user-name-attribute=sub

spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID:parallax-local-github-client}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET:parallax-local-github-secret}
spring.security.oauth2.client.registration.github.scope=user:email
spring.security.oauth2.client.registration.github.redirect-uri={baseUrl}/login/oauth2/code/github

spring.security.oauth2.client.provider.github.authorization-uri=https://github.com/login/oauth/authorize
spring.security.oauth2.client.provider.github.token-uri=https://github.com/login/oauth/access_token
spring.security.oauth2.client.provider.github.user-info-uri=https://api.github.com/user
spring.security.oauth2.client.provider.github.user-name-attribute=id

app.jwt.secret=${JWT_SECRET}

app.jwt.expiration-ms=3600000
app.jwt.refresh-expiration-ms=604800000


# Runner files
code.runner.image-name=py-collab-runner
code.session.image-name=py-collab-session


# Run code limits
code.runner.max-output-bytes=65536

parallax.storage.root=${user.home}/parallax
parallax.storage.sessions=${parallax.storage.root}/sessions
parallax.storage.projects=${parallax.storage.root}/projects
parallax.storage.avatars=${parallax.storage.root}/avatars

server.address=0.0.0.0
server.port=8080
app.frontend.url=http://localhost:3000

code.runner.base-path=/var/code_sessions


